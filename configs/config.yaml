server:
  host: 0.0.0.0
  port: 8080
  jwt_secret: "awd-arena-secret-key-2024"

database:
  sqlite_path: "data/awd.db"

nats:
  url: "nats://localhost:4222"

docker:
  host: "unix:///var/run/docker.sock"

security:
  jwt_expire_hours: 24
  rate_limit: 100
  flag_submit_limit: 100
  blocklist_enabled: true

game:
  default_round_duration: 5m
  default_break_duration: 2m
  max_containers_per_team: 5

ai:
  enabled: true
  rule_engine_path: "./rules/"
  onnx_model_path: "./models/"

log_level: "info"

